<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangQuest — CI/CD Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080e;--card:#12121e;--border:#1e1e38;--border-hi:#3a3a60;
  --text:#d4d4e8;--text2:#8888a8;--text3:#4a4a6a;
  --grp:#ffffff06;--grp-s:#ffffff10;--grp-t:#ffffff30;
  --cyan:#22d3ee;--purple:#a78bfa;--green:#34d399;--pink:#f472b6;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;
  --panel:#111119f0;--code-bg:#ffffff0c;
  --path-dim:#ffffff12;--path-vis:#ffffff28;
}
body.light{
  --bg:#f0f0f8;--card:#ffffff;--border:#d0d0e0;--border-hi:#a0a0c0;
  --text:#1a1a30;--text2:#55557a;--text3:#9090a8;
  --grp:#00000006;--grp-s:#00000012;--grp-t:#00000040;
  --cyan:#0891b2;--purple:#7c3aed;--green:#059669;--pink:#db2777;--amber:#b45309;--red:#dc2626;--blue:#2563eb;
  --panel:#ffffffee;--code-bg:#0000000a;
  --path-dim:#00000010;--path-vis:#00000025;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;z-index:50}
.hdr h1{font-size:1.1rem;font-weight:700}
.hdr .sub{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}
.hdr button{font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer}

.diagram-wrap{flex:1;display:flex;align-items:flex-start;justify-content:center;overflow:hidden;padding-top:8px}
.diagram{width:1200px;height:520px;position:relative;flex-shrink:0}
.diagram>svg{position:relative;z-index:1}
#particleCanvas{position:absolute;inset:0;width:1200px;height:520px;pointer-events:none;z-index:2}

svg text{font-family:'JetBrains Mono',monospace}
.grp-bg{fill:var(--grp);stroke:var(--grp-s);stroke-width:1.5}
.svc-bg{fill:var(--card);stroke:var(--border);stroke-width:1.5;rx:6}
.env-bg{fill:var(--card);stroke:var(--border);stroke-width:1.5;rx:6}
.pill-bg{fill:var(--card);stroke:var(--border);stroke-width:1.5}
.branch-line{stroke:var(--path-dim);stroke-width:3;stroke-linecap:round}
.branch-dot{fill:var(--text3);r:5}

.n{opacity:0;transition:opacity .5s}
.n.dim{opacity:.25}
.n.vis{opacity:1}
.n.hi{opacity:1}
.n.hi>.svc-bg,.n.hi>.env-bg,.n.hi>.pill-bg{stroke:var(--hi,var(--border-hi));filter:url(#glow)}
.n.hi>.merge-line{stroke:var(--hi,var(--border-hi));filter:url(#glow)}
.n.hi>.merge-circle{stroke:var(--hi,var(--border-hi));fill:var(--card);filter:url(#glow)}

.conn{stroke:var(--path-dim);stroke-width:2;fill:none;stroke-linecap:round;opacity:0;transition:opacity .5s}
.conn.vis{opacity:1;stroke:var(--path-vis)}
.route{opacity:0;pointer-events:none}

.panel{border-top:1px solid var(--border);background:var(--panel);padding:14px 28px 14px;flex-shrink:0;backdrop-filter:blur(12px);display:flex;flex-direction:column;gap:6px}
.dots{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap}
.dot-group{display:flex;align-items:center;gap:3px;margin:0 6px}
.dot-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text3);margin-right:4px;text-transform:uppercase;letter-spacing:.08em}
.dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;padding:0}
.dot:hover{border-color:var(--text2)}
.dot.cur{background:var(--pink);border-color:var(--pink)}
.step-phase{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em}
.step-title{font-size:1.1rem;font-weight:700}
.step-desc{font-size:.9rem;color:var(--text2);line-height:1.65}
.step-desc code{font-family:'JetBrains Mono',monospace;font-size:.8rem;background:var(--code-bg);padding:2px 6px;border-radius:4px;color:var(--cyan)}
.step-desc strong{color:var(--text);font-weight:600}
.step-desc .warn{color:var(--red);font-weight:500}
.step-nav{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.step-ctr{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3)}
.step-btns{display:flex;gap:8px}
.nbtn{font-family:'JetBrains Mono',monospace;font-size:.78rem;padding:7px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s}
.nbtn:hover{border-color:var(--border-hi);color:var(--text)}
.nbtn:disabled{opacity:.3;pointer-events:none}
.nbtn.pri{border-color:var(--pink);color:var(--pink)}
</style>
</head>

<script>
let isLight=false,cur=0;
function toggleTheme(){
  isLight=!isLight;document.body.classList.toggle('light',isLight);
  document.getElementById('themeBtn').textContent=isLight?'☾ Dark':'☀ Light';
  try{localStorage.setItem('lq-cicd-theme',isLight?'light':'dark')}catch(e){}
}
(function(){try{if(localStorage.getItem('lq-cicd-theme')==='light'){isLight=true;document.body.classList.add('light');document.getElementById('themeBtn').textContent='☾ Dark'}}catch(e){}})();

function getC(v){return getComputedStyle(document.body).getPropertyValue(v).trim()}

// ── Particle system ──
const canvas=document.getElementById('particleCanvas');
const ctx=canvas.getContext('2d');
let particles=[],pathEls={},pathLens={},lastTs=0,spawnInterval=null;
const SPEED=120;

function initCanvas(){
  const dpr=window.devicePixelRatio||1;
  canvas.width=1200*dpr;canvas.height=520*dpr;
  ctx.scale(dpr,dpr);
}

function cachePath(id){
  const el=document.getElementById(id);
  if(el){pathEls[id]=el;pathLens[id]=el.getTotalLength();}
}

function spawnParticle(seq,color){
  particles.push({seq,si:0,progress:0,color,trail:[],alive:true});
}

function animateParticles(ts){
  const dt=lastTs?(ts-lastTs)/1000:0.016;lastTs=ts;
  const cdt=Math.min(dt,.05);

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];if(!p.alive)continue;
    const pid=p.seq[p.si],el=pathEls[pid],len=pathLens[pid];
    if(!el||!len){p.alive=false;continue;}
    p.progress+=SPEED/len*cdt;
    const pt=el.getPointAtLength(Math.min(p.progress,1)*len);
    p.trail.unshift({x:pt.x,y:pt.y});if(p.trail.length>6)p.trail.pop();
    if(p.progress>=1){p.si++;p.progress=0;if(p.si>=p.seq.length)p.alive=false;}
  }
  particles=particles.filter(p=>p.alive);

  ctx.clearRect(0,0,1200,520);
  for(const p of particles){
    if(!p.trail.length)continue;
    for(let i=p.trail.length-1;i>=0;i--){
      const t=p.trail[i],a=(1-i/p.trail.length),r=3-i*.35;
      if(r<=0||a<=0)continue;
      ctx.save();ctx.globalAlpha=a*.2;ctx.shadowBlur=10;ctx.shadowColor=p.color;
      ctx.beginPath();ctx.arc(t.x,t.y,r+2,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore();
      ctx.save();ctx.globalAlpha=a*.7;ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore();
    }
    const h=p.trail[0];
    ctx.save();ctx.globalAlpha=.8;ctx.beginPath();ctx.arc(h.x,h.y,1.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.restore();
  }
  requestAnimationFrame(animateParticles);
}

// ── Steps ──
const S=[
  // Setup 0-4
  {p:'Setup',c:'var(--cyan)',t:'Create a feature branch off dev',
   d:'Branch off <code>dev</code> to start your feature. Dev is the integration branch — always ready to merge into main.',
   hi:['b-feat'],vis:['b-dev','b-main'],dim:[],conns:[],
   parts:null},

  {p:'Setup',c:'var(--cyan)',t:'Ensure Docker is running',
   d:'<strong>Docker Desktop</strong> (or OrbStack) must be running. In the local development environment, Supabase and PowerSync run as local Docker containers.',
   hi:[],vis:['b-feat','b-dev','b-main'],dim:[],conns:[],
   parts:null},

  {p:'Setup',c:'var(--cyan)',t:'Run npm run env',
   d:'This single command: generates <code>.env.local</code>, starts Supabase (Postgres, Auth, Storage), seeds the vault, serves edge functions, and starts PowerSync.',
   hi:['n-sb-dev','n-ps-dev','n-env-dev'],vis:['b-feat','b-dev','b-main'],dim:[],
   conns:['c-up-d','c-across-d','c-down-d'],
   parts:{seq:['c-up-d','c-across-d','c-down-d'],cv:'--cyan'}},

  {p:'Setup',c:'var(--cyan)',t:'Config files already in the repo',
   d:'Three files define the local environment:<br>• <code>supabase/config.toml</code> — DB, auth, API ports<br>• <code>supabase/config/powersync.yml</code> — sync, replication, JWT<br>• <code>supabase/config/sync-rules.yml</code> — per-user data routing',
   hi:['n-sb-dev','n-ps-dev'],vis:['b-feat','b-dev','b-main','n-env-dev'],dim:[],
   conns:['c-up-d','c-across-d','c-down-d'],

function buildDots(){
  const nav=document.getElementById('dotNav');
  let html='',phase='';
  S.forEach((s,i)=>{
    if(s.p!==phase){
      if(phase)html+='</div>';
      html+=`<div class="dot-group"><span class="dot-label">${s.p}</span>`;
      phase=s.p;
    }
    html+=`<button class="dot${i===cur?' cur':''}" onclick="go(${i})" title="Step ${i+1}: ${s.t}"></button>`;
  });
  html+='</div>';
  nav.innerHTML=html;
}

function go(i){
  if(i<0||i>=S.length)return;
  cur=i;render();
}

function render(){
  const s=S[cur];
  document.getElementById('stepPhase').textContent=s.p;
  document.getElementById('stepPhase').style.color=s.c;
  document.getElementById('stepTitle').textContent=s.t;
  document.getElementById('stepDesc').innerHTML=s.d;
  document.getElementById('stepCtr').textContent=`Step ${cur+1} of ${S.length}`;
  document.getElementById('prevBtn').disabled=cur===0;
  const nb=document.getElementById('nextBtn');
  nb.textContent=cur===S.length-1?'Done ✓':'Next →';
  nb.disabled=cur===S.length-1;

  const hiSet=new Set(s.hi),visSet=new Set(s.vis),dimSet=new Set(s.dim);
  const connSet=new Set(s.conns||[]);

  document.querySelectorAll('.n').forEach(el=>{
    el.classList.remove('vis','hi','dim');
    if(hiSet.has(el.id))el.classList.add('hi');
    else if(visSet.has(el.id))el.classList.add('vis');
    else if(dimSet.has(el.id))el.classList.add('dim');
  });

  document.querySelectorAll('.conn').forEach(el=>{
    el.classList.remove('vis');
    if(connSet.has(el.id))el.classList.add('vis');
  });

  document.querySelectorAll('.dot').forEach((d,i)=>{d.classList.toggle('cur',i===cur)});

  // Restart particles
  if(spawnInterval){clearInterval(spawnInterval);spawnInterval=null;}
  particles=[];
  if(s.parts){
    const color=getC(s.parts.cv);
    const spawn=()=>{
      spawnParticle(s.parts.seq,color);
      if(s.parts.alt)spawnParticle(s.parts.alt,color);
    };
    spawn();
    spawnInterval=setInterval(spawn,4000);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(cur-1);}
});

function fitDiagram(){
  const d=document.querySelector('.diagram'),h=document.querySelector('.hdr'),p=document.querySelector('.panel');
  const vw=window.innerWidth,vh=window.innerHeight-h.offsetHeight-p.offsetHeight;
  const sc=Math.min(vw/1220,vh/530,1);
  d.style.transform=`scale(${sc})`;d.style.transformOrigin='top center';
}

// ── Init ──
function init(){
  initCanvas();
  ['c-up-d','c-across-d','c-down-d','c-up-p-feat','c-up-p','c-across-p','c-down-p-feat','c-down-p',
   'c-up-r','c-across-r','c-down-r','r-merge-fd','r-merge-dm','c-main-expo','c-expo-play','c-expo-app'
  ].forEach(cachePath);
  buildDots();render();fitDiagram();
  window.addEventListener('resize',fitDiagram);
  requestAnimationFrame(animateParticles);
}
init();
