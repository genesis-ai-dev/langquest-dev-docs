<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangQuest — Database Schema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080e;--card:#10101a;--border:#1a1a2e;--border-hi:#2a2a44;
  --text:#d4d4e8;--text2:#7a7a9a;--text3:#3a3a5a;
  --cyan:#22d3ee;--purple:#a78bfa;--green:#34d399;--pink:#f472b6;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;
  --panel:#0e0e18f0;--code-bg:#ffffff08;
  --edge-fk:#a78bfa60;--edge-dot:#a78bfa;
}
body.light{
  --bg:#f0f0f8;--card:#ffffff;--border:#d0d0e0;--border-hi:#a0a0c0;
  --text:#1a1a30;--text2:#55557a;--text3:#9090a8;
  --panel:#ffffffee;--code-bg:#0000000a;
  --edge-fk:#7c3aed40;--edge-dot:#7c3aed;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border);background:#0c0c14;flex-shrink:0;z-index:50;gap:12px}
body.light .hdr{background:var(--bg)}
.hdr h1{font-size:.95rem;font-weight:600}
.hdr .sub{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-top:1px}
.hdr-btns{display:flex;gap:6px}
.hdr-btns button{font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s}
.hdr-btns button:hover{border-color:var(--border-hi);color:var(--text)}

.tabbar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;max-height:100px;overflow-y:auto}
.tab{font-family:'JetBrains Mono',monospace;font-size:.6rem;padding:6px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab:hover{border-color:var(--border-hi);color:var(--text)}
.tab:active{transform:scale(.97)}
.tab.on{border-color:var(--pink);color:var(--pink);background:#f472b60a}

.diagram-wrap{flex:1;overflow:auto;padding:16px;min-height:0}
.diagram-canvas{position:relative;min-width:400px;min-height:300px;margin:0 auto}
.diagram-canvas svg.edge-layer{position:absolute;left:0;top:0;pointer-events:none!important;overflow:visible;z-index:1}

.sn{position:absolute;z-index:2;border:1px solid var(--border);border-radius:10px;background:var(--card);box-shadow:0 2px 16px rgba(0,0,0,.35);min-width:150px;max-width:280px;transition:box-shadow .25s,border-color .25s,opacity .2s;cursor:grab;user-select:none}
.sn:hover{border-color:var(--border-hi)}
.sn.dragging{z-index:50;opacity:.92;box-shadow:0 12px 40px rgba(0,0,0,.5);cursor:grabbing}
.sn.tb-hi{border-color:var(--purple);box-shadow:0 0 16px #a78bfa18,0 0 0 1px var(--purple)}
body.light .sn.tb-hi{box-shadow:0 0 12px #7c3aed15,0 0 0 1px var(--purple)}

.sn-head{display:flex;align-items:center;gap:7px;padding:8px 6px 8px 12px}
.sn.expanded .sn-head{border-bottom:1px solid var(--border)}
.sn-titles{flex:1;min-width:0}
.sn-titles .name{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;line-height:1.2;color:var(--text)}
.sn-titles .sub{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--text3);margin-top:1px;text-transform:uppercase;letter-spacing:.06em}
.sn-chevron{appearance:none;border:none;background:none;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.5rem;color:var(--text3);cursor:pointer;transition:all .15s;flex-shrink:0;padding:0}
.sn-chevron:hover{background:var(--border);color:var(--text2)}
.sn.expanded .sn-chevron{transform:rotate(90deg)}

.sn-fields{display:none}
.sn.expanded .sn-fields{display:block}
.fr{font-family:'JetBrains Mono',monospace;font-size:.58rem;padding:4px 10px 4px 10px;display:flex;align-items:center;gap:5px;border-top:1px solid #ffffff06;position:relative}
body.light .fr{border-top-color:#00000006}
.fr .fn{word-break:break-all;transition:color .15s}
.fr .ft{font-size:.44rem;padding:1px 4px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.fr.pk .fn{color:var(--cyan)}
.fr.pk .ft{background:#22d3ee18;color:var(--cyan)}
.fr.fk .fn{color:var(--purple)}
.fr.fk .ft{background:#a78bfa18;color:var(--purple)}
.fr.dim .fn{color:var(--text3)}
.fr.fk{padding-left:8px;border-left:2px solid var(--purple)}
.fr.pk{padding-left:8px;border-left:2px solid var(--cyan)}

.ft-self{background:#fbbf2418!important;color:var(--amber)!important}
.fh{width:14px;height:14px;border-radius:50%;border:1px solid var(--text3);display:inline-flex;align-items:center;justify-content:center;font-size:.42rem;color:var(--text3);cursor:pointer;flex-shrink:0;margin-left:auto;transition:all .15s;padding:0;background:none;font-family:'JetBrains Mono',monospace;line-height:1}
.fh:hover{border-color:var(--text2);color:var(--text2);background:var(--border)}
.hint-pop{position:fixed;z-index:200;background:#161622ee;border:1px solid var(--border-hi);border-radius:10px;padding:10px 14px;max-width:280px;font-family:'DM Sans',sans-serif;font-size:.72rem;color:var(--text2);line-height:1.55;backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;pointer-events:none}
.hint-pop.vis{display:block}
body.light .hint-pop{background:#ffffffee;box-shadow:0 8px 24px rgba(0,0,0,.12)}

.diagram-title-float{position:absolute;left:50%;transform:translateX(-50%);top:6px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.14em;pointer-events:none;z-index:3;opacity:.6}

.panel{border-top:1px solid var(--border);background:var(--panel);padding:12px 24px 14px;flex-shrink:0;backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:5px;max-height:45vh;overflow-y:auto}
.dots{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;padding:0}
.dot:hover{border-color:var(--text2)}
.dot.cur{background:var(--pink);border-color:var(--pink);box-shadow:0 0 6px #f472b640}
.step-phase{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.step-title{font-size:.95rem;font-weight:600}
.step-desc{font-size:.82rem;color:var(--text2);line-height:1.6}
.step-desc code{font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--code-bg);padding:1px 5px;border-radius:3px;color:var(--pink)}
.step-desc strong{color:var(--text);font-weight:600}
.step-nav{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.step-ctr{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text3)}
.step-btns{display:flex;gap:8px}
.nbtn{font-family:'JetBrains Mono',monospace;font-size:.68rem;padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s}
.nbtn:hover{border-color:var(--border-hi);color:var(--text)}
.nbtn:disabled{opacity:.3;pointer-events:none}
.nbtn.pri{border-color:var(--pink);color:var(--pink)}
.nbtn.pri:hover{background:#f472b608}

.mf{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin:8px 0 2px;font-family:'JetBrains Mono',monospace;font-size:.58rem}
.mf .mp{padding:3px 8px;border-radius:10px;border:1px solid var(--c,var(--text3));color:var(--c,var(--text2));white-space:nowrap}
.mf .ma{color:var(--text3);font-size:.5rem}
.mt{margin:6px 0 2px;font-family:'JetBrains Mono',monospace;font-size:.6rem;line-height:1.9;color:var(--text2)}
.mt b{font-weight:600}
</style>
</head>
<body>
<div class="hdr">
  <div><h1>Database Schema</h1><div class="sub">LangQuest · Postgres / Supabase</div></div>
  <div class="hdr-btns">
    <button type="button" onclick="logPositions()">📋 Log</button>
    <button type="button" onclick="resetLayout()">⟲ Reset</button>
    <button type="button" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
  </div>
</div>
<div class="tabbar" id="tabbar" role="tablist"></div>
<div class="diagram-wrap" id="diagramWrap">
  <div class="diagram-canvas" id="diagramRoot"></div>
</div>
<div class="panel">
  <div class="dots" id="dotNav"></div>
  <div class="step-phase" id="stepPhase"></div>
  <div class="step-title" id="stepTitle"></div>
  <div class="step-desc" id="stepDesc"></div>
  <div class="step-nav">
    <span class="step-ctr" id="stepCtr"></span>
    <div class="step-btns">
      <button type="button" class="nbtn" id="prevBtn" onclick="goStep(curStep-1)">← Back</button>
      <button type="button" class="nbtn pri" id="nextBtn" onclick="goStep(curStep+1)">Next →</button>
    </div>
  </div>
</div>
<div class="hint-pop" id="hintPop"></div>

<script>
let isLight=false;
function toggleTheme(){
  isLight=!isLight;document.body.classList.toggle('light',isLight);
  document.getElementById('themeBtn').textContent=isLight?'☾ Dark':'☀ Light';
  try{localStorage.setItem('lq-schema-theme',isLight?'light':'dark')}catch(e){}
}
(function(){try{if(localStorage.getItem('lq-schema-theme')==='light'){isLight=true;document.body.classList.add('light');document.getElementById('themeBtn').textContent='☾ Dark'}}catch(e){}})();

function hvhPath(x1,y1,x2,y2,mx,r){
  const f=v=>v.toFixed(1);
  const dy=y2-y1;
  if(Math.abs(dy)<1)return`M${f(x1)} ${f(y1)} L${f(x2)} ${f(y2)}`;
  r=Math.min(r,Math.abs(mx-x1)-1,Math.abs(mx-x2)-1,Math.abs(dy)/2);
  if(r<1)r=0;
  if(r<1)return`M${f(x1)} ${f(y1)} L${f(mx)} ${f(y1)} L${f(mx)} ${f(y2)} L${f(x2)} ${f(y2)}`;
  const s1=mx>x1?1:-1,sy=y2>y1?1:-1,s2=x2>mx?1:-1;
  return`M${f(x1)} ${f(y1)} L${f(mx-s1*r)} ${f(y1)} Q${f(mx)} ${f(y1)} ${f(mx)} ${f(y1+sy*r)} L${f(mx)} ${f(y2-sy*r)} Q${f(mx)} ${f(y2)} ${f(mx+s2*r)} ${f(y2)} L${f(x2)} ${f(y2)}`;
}

function F(name,o){return Object.assign({name},o||{})}
const DP='UUID[] of users who flagged this record for offline sync. Stamped by closure-based download RPCs.';

const DIA_QUEST_TREE='<div class="mt">'+
  '<b style="color:var(--cyan)">Bible Project</b><br>'+
  '&nbsp;&nbsp;└ <b style="color:var(--purple)">Mark</b> <span style="color:var(--text3);font-size:.5rem">book quest · parent_id = null</span><br>'+
  '&nbsp;&nbsp;&nbsp;&nbsp;└ <b style="color:var(--green)">Chapter 2</b> <span style="color:var(--text3);font-size:.5rem">parent_id → Mark</span><br>'+
  '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;├ <span style="color:var(--text2)">Verse 1</span> <span style="color:var(--text3);font-size:.5rem">asset</span><br>'+
  '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;└ <span style="color:var(--text2)">Verse 2</span> <span style="color:var(--text3);font-size:.5rem">asset</span></div>';

const DIA_ASSET_TRI='<svg viewBox="0 0 290 72" width="290" height="72" style="margin:6px 0 2px;display:block">'+
  '<rect x="90" y="2" width="110" height="20" rx="4" fill="none" stroke="var(--cyan)" stroke-width="1"/>'+
  '<text x="145" y="15" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" fill="var(--cyan)">Source Asset</text>'+
  '<line x1="115" y1="22" x2="55" y2="48" stroke="var(--purple)" stroke-width="1" stroke-dasharray="3 2"/>'+
  '<line x1="175" y1="22" x2="235" y2="48" stroke="var(--purple)" stroke-width="1" stroke-dasharray="3 2"/>'+
  '<text x="62" y="39" font-family="JetBrains Mono,monospace" font-size="6" fill="var(--text3)">source_asset_id</text>'+
  '<text x="195" y="39" font-family="JetBrains Mono,monospace" font-size="6" fill="var(--text3)">source_asset_id</text>'+
  '<rect x="2" y="48" width="106" height="20" rx="4" fill="none" stroke="var(--purple)" stroke-width="1"/>'+
  '<text x="55" y="62" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="var(--purple)">Translation asset</text>'+
  '<rect x="182" y="48" width="106" height="20" rx="4" fill="none" stroke="var(--purple)" stroke-width="1"/>'+
  '<text x="235" y="62" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="7" fill="var(--purple)">Transcription asset</text></svg>';

const DIA_INVITE='<div class="mf">'+
  '<span class="mp" style="--c:var(--purple)">owner sends invite</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--amber)">pending</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--text2)">trigger finds profile</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--green)">syncs to recipient</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--green)">accepted / declined</span></div>';

const DIA_CLONE='<div class="mf">'+
  '<span class="mp" style="--c:var(--red)">0 seed_project</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--red)">1 clone_quests</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--red)">2 clone_assets</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--red)">3 clone_acl</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--red)">4 recreate_links</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--red)">5 recompute_closures</span></div>';

const DIA_DOWNLOAD='<div class="mf">'+
  '<span class="mp" style="--c:var(--amber)">user taps Download</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--text2)">read closure IDs</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--purple)">stamp download_profiles[]</span><span class="ma">→</span>'+
  '<span class="mp" style="--c:var(--green)">PowerSync syncs to device</span></div>';

const DIA_ALIAS='<div class="mf">'+
  '<span class="mp" style="--c:var(--cyan)">Spanish</span>'+
  '<span class="ma">← subject ─</span>'+
  '<span class="mp" style="--c:var(--pink);background:var(--code-bg)">alias: "espagnol"</span>'+
  '<span class="ma">─ label →</span>'+
  '<span class="mp" style="--c:var(--green)">French</span></div>'+
  '<div style="font-size:.6rem;color:var(--text3);margin-top:2px;font-family:JetBrains Mono,monospace">If subject = label → endonym · otherwise → exonym</div>';

const SECTIONS=[
{
  id:'primary',label:'Primary chain',phaseColor:'var(--cyan)',diagramTitle:'Spine — content & collaboration',
  nodes:[
    {id:'n-project',title:'project',sub:'workspace',x:117,y:128,w:200,fields:[
      F('id',{pk:true}),F('name'),F('creator_id'),
      F('template',{hint:'Project type: unstructured, bible, or fia. Will evolve into linked template records.'}),
      F('private',{hint:'When true, only members can contribute.'}),
      F('visible',{hint:'Controls whether the project appears in public listings.'}),
      F('download_profiles',{hint:DP})]},
    {id:'n-quest',title:'quest',sub:'unit of work',x:458,y:106,w:200,fields:[
      F('id',{pk:true}),F('project_id',{fk:{node:'n-project',field:'id'}}),
      F('parent_id',{fk:{node:'n-quest',field:'id'},selfRef:true,hint:'Nesting: book quests hold chapter quests. No depth limit.'}),
      F('name'),F('active'),
      F('metadata',{hint:'Template-specific positioning, e.g. which book/chapter this quest maps to.'}),
      F('download_profiles',{hint:DP})]},
    {id:'n-qal',title:'quest_asset_link',sub:'M:N join',x:784,y:106,w:200,fields:[
      F('quest_id',{fk:{node:'n-quest',field:'id'}}),F('asset_id',{fk:{node:'n-asset',field:'id'}}),
      F('active'),F('visible'),F('download_profiles',{hint:DP})]},
    {id:'n-asset',title:'asset',sub:'translatable unit',x:458,y:326,w:220,fields:[
      F('id',{pk:true}),F('project_id',{fk:{node:'n-project',field:'id'}}),
      F('parent_id',{fk:{node:'n-asset',field:'id'},selfRef:true,hint:'Unused/forgotten. Hierarchy uses source_asset_id instead.'}),
      F('content_type',{hint:"'source', 'translation', or 'transcription'. Translations link back via source_asset_id."}),
      F('source_asset_id',{fk:{node:'n-asset',field:'id'},selfRef:true,hint:'Points to the original source asset this translation/transcription was derived from.'}),
      F('order_index',{hint:'Preserves display order of assets within a quest.'}),
      F('metadata',{hint:'Verse or labelling information for templated content.'}),
      F('download_profiles',{hint:DP})]},
    {id:'n-acl',title:'asset_content_link',sub:'text / audio',x:783,y:325,w:220,fields:[
      F('id',{pk:true}),F('asset_id',{fk:{node:'n-asset',field:'id'}}),
      F('languoid_id',{hint:'Language of this particular expression of the asset.'}),
      F('text'),
      F('audio',{hint:'Filename of the audio file in Supabase Storage.'}),
      F('order_index',{hint:'Ordering from the experimental asset merge feature.'}),
      F('text_search_vector',{hint:'Auto-generated tsvector for full-text search.'}),
      F('download_profiles',{hint:DP})]},
    {id:'n-vote',title:'vote',sub:'feedback',x:782,y:592,w:200,fields:[
      F('id',{pk:true}),F('asset_id',{fk:{node:'n-asset',field:'id'}}),
      F('polarity',{hint:'Quality rating on a translation or transcription.'}),
      F('comment'),
      F('translation_id',{hint:'Legacy column from before asset-based translations. No FK enforced.'}),
      F('creator_id'),F('active'),F('download_profiles',{hint:DP})]}
  ],
  edges:[
    {from:'n-quest',fromField:'project_id',to:'n-project',toField:'id'},
    {from:'n-qal',fromField:'quest_id',to:'n-quest',toField:'id'},
    {from:'n-qal',fromField:'asset_id',to:'n-asset',toField:'id'},
    {from:'n-asset',fromField:'project_id',to:'n-project',toField:'id'},
    {from:'n-acl',fromField:'asset_id',to:'n-asset',toField:'id'},
    {from:'n-vote',fromField:'asset_id',to:'n-asset',toField:'id'}
  ],
  steps:[
    {t:'Overview: the spine',d:'The <strong>project → quest → asset</strong> chain forms the spine of user-generated language data. Each level adds structure: projects scope an effort, quests organize units of work, and assets hold the actual translatable content. <strong>Drag</strong> any table to rearrange; click <strong>▶</strong> to expand fields; hover <strong>?</strong> icons for field details.',hi:['n-project','n-quest','n-qal','n-asset','n-acl','n-vote']},
    {t:'project',d:'A <strong>project</strong> represents a collaborative effort to translate content from/into a particular language. It links to members (see Membership tab), content, and languages (see Languoid tab). Settings control whether the project is <code>active</code>, <code>visible</code>, and <code>private</code>.',hi:['n-project']},
    {t:'quest',d:'A <strong>quest</strong> is like a folder. In templated projects (Bible, FIA), quests are predefined — e.g. book quests at the root, chapter quests nested within. In unstructured projects, users define them freely. No nesting limit.'+DIA_QUEST_TREE,hi:['n-quest']},
    {t:'quest_asset_link',d:'Originally a junction table for M:N (overlapping passages sharing verses). Now also enables <strong>quest versioning</strong> — users A and B can submit their own versions of the same templated quest, and a future "remix" feature will let users pick assets across versions without duplicating them.',hi:['n-qal']},
    {t:'asset',d:'An <strong>asset</strong> is a small translatable unit — a verse, a line, a recording. All modalities (audio, image, text) represent the same piece of information. Translations and transcriptions are also assets, linking back to the source via <code>source_asset_id</code>.'+DIA_ASSET_TRI,hi:['n-asset']},
    {t:'asset_content_link',d:'Stores different <strong>expressions</strong> of the same asset — e.g. the same verse in multiple Bible translations or languages. Each row has text and/or audio for one expression, keyed by <code>languoid_id</code>. The <code>audio</code> field holds a filename pointing to Supabase Storage.',hi:['n-acl']},
    {t:'vote',d:'Votes rate the quality of translations and transcriptions — not the source content itself. <code>polarity</code> captures the rating. The <code>translation_id</code> column is legacy from before translations became assets; no FK is enforced.',hi:['n-vote']}
  ]
},
{
  id:'membership',label:'Membership',phaseColor:'var(--purple)',diagramTitle:'Users & project access',
  nodes:[
    {id:'m-profile',title:'profile',sub:'auth.users',x:68,y:225,w:210,fields:[
      F('id',{pk:true,hint:'Same UUID as auth.users(id). Created by Supabase Auth.'}),
      F('username'),F('email'),
      F('ui_languoid_id',{hint:"User's preferred UI language."}),
      F('active'),F('terms_accepted')]},
    {id:'m-ppl',title:'profile_project_link',sub:'owner | member',x:509,y:25,w:230,fields:[
      F('profile_id',{fk:{node:'m-profile',field:'id'}}),
      F('project_id',{fk:{node:'m-proj',field:'id'}}),

  id:'expired',label:'Expired / legacy',phaseColor:'var(--text2)',diagramTitle:'Legacy',
  nodes:[
    {id:'e-lang',title:'language',sub:'deprecated',x:80,y:80,w:220,fields:[
      F('id',{pk:true}),
      F('iso639_3',{hint:'ISO 639-3 language code.'}),
      F('native_name',{hint:"Name in the language's own script."}),
      F('english_name'),
      F('ui_ready',{hint:'Has enough data for UI display.'}),
      F('creator_id')]},
    {id:'e-tr',title:'translation',sub:'deprecated',x:420,y:80,w:220,fields:[
      F('id',{pk:true}),
      F('asset_id',{hint:'The source asset being translated.'}),
      F('target_language_id',{hint:'Legacy FK to the old language table.'}),
      F('text'),
      F('audio',{hint:'Audio filename in storage.'}),
      F('creator_id')]}
  ],
  edges:[{from:'e-tr',fromField:'target_language_id',to:'e-lang',toField:'id',dash:true}],
  steps:[
    {t:'Legacy tables',d:'Both tables are <strong>superseded</strong>. <code>language</code> replaced by the hierarchical <code>languoid</code> subschema. <code>translation</code> replaced by assets with <code>content_type=\'translation\'</code> and <code>source_asset_id</code>. Still exist because some old FKs and quest_closure triggers haven\'t been fully migrated.',hi:['e-lang','e-tr']},
    {t:'language',d:'The original flat language catalog — English name, native name, ISO 639-3 code. Replaced by the <code>languoid</code> table and its subschema. The <code>language_languoid_map</code> table bridges old IDs to new ones.',hi:['e-lang']},
    {t:'translation',d:'Standalone translation records linking to a source asset. Replaced by the current approach where translations are assets with <code>content_type=\'translation\'</code>. The <code>quest_closure</code> triggers still reference this table.',hi:['e-tr']}
  ]
}
];

let tabIndex=0,curStep=0,expandedBySection={};
function currentSection(){return SECTIONS[tabIndex]}
function storageKey(){return 'lq-schema-v5-'+currentSection().id}
function loadPositions(){try{const r=localStorage.getItem(storageKey());return r?JSON.parse(r):null}catch(e){return null}}
function savePositions(){
  const pos={};
  document.querySelectorAll('#diagramRoot .sn').forEach(n=>{pos[n.dataset.nodeId]={x:parseFloat(n.style.left)||0,y:parseFloat(n.style.top)||0}});
  try{localStorage.setItem(storageKey(),JSON.stringify(pos))}catch(e){}
}
function resetLayout(){try{localStorage.removeItem(storageKey())}catch(e){} injectDiagram();renderStep();}
function buildTabs(){document.getElementById('tabbar').innerHTML=SECTIONS.map((s,i)=>`<button type="button" role="tab" class="tab${i===tabIndex?' on':''}" onclick="setTab(${i})">${s.label}</button>`).join('')}
function getExpandedMap(){const id=currentSection().id;if(!expandedBySection[id])expandedBySection[id]={};return expandedBySection[id]}

function logPositions(){
  const sec=currentSection(),lines=[];
  sec.nodes.forEach(n=>{
    const el=document.getElementById('node-'+n.id);
    if(!el)return;
    const x=Math.round(parseFloat(el.style.left)||0),y=Math.round(parseFloat(el.style.top)||0);
    lines.push(`{id:'${n.id}', x:${x}, y:${y}, w:${n.w}}`);
  });
  const txt='// ['+sec.id+'] node positions\n'+lines.join('\n');
  console.log(txt);
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.querySelector('.hdr-btns button');
    const orig=btn.textContent;btn.textContent='✓ Copied';
    setTimeout(()=>{btn.textContent=orig},1500);
  }).catch(()=>{alert(txt)});
}

function renderNode(n,expMap){
  const exp=expMap[n.id]===true;
  const fields=(n.fields||[]).map(f=>{
    const fk=f.fk,cls=['fr'];
    if(f.pk)cls.push('pk');else if(fk)cls.push('fk');else cls.push('dim');
    const isSelf=f.selfRef;
    let tags='';
    if(f.pk)tags+='<span class="ft">pk</span>';
    if(fk&&isSelf)tags+='<span class="ft ft-self">self</span>';
    else if(fk)tags+='<span class="ft">fk</span>';
    const hint=f.hint?`<button type="button" class="fh" data-hint="${f.hint.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();showHint(event)">?</button>`:'';
    return`<div class="${cls.join(' ')}" data-field="${f.name}"><span class="fn">${f.name}</span>${tags}${hint}</div>`;
  }).join('');
  return`<div class="sn${exp?' expanded':''}" data-node-id="${n.id}" id="node-${n.id}" style="left:${n.x}px;top:${n.y}px;width:${n.w}px"><div class="sn-head"><div class="sn-titles"><div class="name">${n.title}</div>${n.sub?`<div class="sub">${n.sub}</div>`:''}</div><button type="button" class="sn-chevron" data-role="toggle">▶</button></div><div class="sn-fields">${fields}</div></div>`;
}

let activeHintBtn=null;
function showHint(ev){
  const btn=ev.currentTarget,pop=document.getElementById('hintPop');
  if(activeHintBtn===btn){hideHint();return;}
  pop.textContent=btn.dataset.hint;
  const r=btn.getBoundingClientRect();
  pop.style.left=Math.max(8,Math.min(r.left-40,window.innerWidth-296))+'px';
  pop.style.top=(r.bottom+6)+'px';
  pop.classList.add('vis');
  activeHintBtn=btn;
}
function hideHint(){
  document.getElementById('hintPop').classList.remove('vis');
  activeHintBtn=null;
}
document.addEventListener('pointerdown',ev=>{if(!ev.target.closest('.fh'))hideHint()});

function injectDiagram(){
  const sec=currentSection(),saved=loadPositions(),expMap=getExpandedMap();
  let html='<svg class="edge-layer" id="edgeSvg"></svg>';
  if(sec.diagramTitle)html+=`<div class="diagram-title-float">${sec.diagramTitle}</div>`;
  sec.nodes.forEach(n=>{const c=Object.assign({},n);if(saved&&saved[n.id]){c.x=saved[n.id].x;c.y=saved[n.id].y;}html+=renderNode(c,expMap)});
  document.getElementById('diagramRoot').innerHTML=html;
  bindDiagramEvents();resizeCanvas();requestAnimationFrame(drawEdges);
}

function resizeCanvas(){
  const c=document.getElementById('diagramRoot'),wrap=document.getElementById('diagramWrap'),nodes=c.querySelectorAll('.sn');
  let minL=Infinity,minT=Infinity,mR=0,mB=0;
  nodes.forEach(n=>{
    const x=parseFloat(n.style.left)||0,y=parseFloat(n.style.top)||0;
    minL=Math.min(minL,x);minT=Math.min(minT,y);
    mR=Math.max(mR,x+n.offsetWidth+60);mB=Math.max(mB,y+n.offsetHeight+60);
  });
  if(!nodes.length){minL=0;minT=0;mR=800;mB=400}
  const PAD=20,shiftX=minL<PAD?PAD-minL:0,shiftY=minT<PAD?PAD-minT:0;
  if(shiftX>0||shiftY>0){
    nodes.forEach(n=>{
      if(shiftX)n.style.left=((parseFloat(n.style.left)||0)+shiftX)+'px';
      if(shiftY)n.style.top=((parseFloat(n.style.top)||0)+shiftY)+'px';
    });
    mR+=shiftX;mB+=shiftY;
    wrap.scrollLeft+=shiftX;wrap.scrollTop+=shiftY;
  }
  c.style.width=Math.max(800,mR)+'px';c.style.height=Math.max(400,mB)+'px';
  const svg=document.getElementById('edgeSvg');
  if(svg){svg.setAttribute('width',c.style.width);svg.setAttribute('height',c.style.height);svg.style.width=c.style.width;svg.style.height=c.style.height}
}

function fieldEl(node,name){if(!name)return null;for(const r of node.querySelectorAll('.fr'))if(r.dataset.field===name)return r;return null}

function anchor(nodeId,fieldName,side){
  const canvas=document.getElementById('diagramRoot'),node=document.getElementById('node-'+nodeId);
  if(!node)return null;
  const cr=canvas.getBoundingClientRect(),nr=node.getBoundingClientRect();
  const row=node.classList.contains('expanded')?fieldEl(node,fieldName):null;
  const y=row?(row.getBoundingClientRect().top+row.getBoundingClientRect().height/2-cr.top):(nr.top+nr.height/2-cr.top);
  return{x:side==='right'?nr.right-cr.left:nr.left-cr.left, y};
}

function findClearMx(defaultMx,yMin,yMax,boxes,pad){
  pad=pad||6;
  function blocked(mx){for(const b of boxes){if(mx>=b.l-pad&&mx<=b.r+pad&&yMin<b.b+pad&&yMax>b.t-pad)return true}return false}
  if(!blocked(defaultMx))return defaultMx;
  for(let off=12;off<500;off+=8){if(!blocked(defaultMx-off))return defaultMx-off;if(!blocked(defaultMx+off))return defaultMx+off}
  return defaultMx;
}

function drawEdges(){
  const edges=currentSection().edges||[],svg=document.getElementById('edgeSvg');
  if(!svg)return;
  const canvas=document.getElementById('diagramRoot'),cr=canvas.getBoundingClientRect();
  const boxes=[];
  canvas.querySelectorAll('.sn').forEach(n=>{const r=n.getBoundingClientRect();boxes.push({id:n.dataset.nodeId,l:r.left-cr.left,r:r.right-cr.left,t:r.top-cr.top,b:r.bottom-cr.top})});
  const pairMap={};
  edges.forEach((e,i)=>{const k=[e.from,e.to].sort().join('|');if(!pairMap[k])pairMap[k]=[];pairMap[k].push(i)});
  const laneOf={};
  Object.values(pairMap).forEach(arr=>arr.forEach((ei,li)=>{laneOf[ei]={count:arr.length,lane:li}}));

  let out='<defs><marker id="dot-end" markerWidth="6" markerHeight="6" refX="3" refY="3"><circle cx="3" cy="3" r="2.5" fill="var(--edge-dot)" opacity=".7"/></marker></defs>';
  edges.forEach((e,idx)=>{
    const na=document.getElementById('node-'+e.from),nb=document.getElementById('node-'+e.to);
    if(!na||!nb)return;
    const aCx=parseFloat(na.style.left)+na.offsetWidth/2,bCx=parseFloat(nb.style.left)+nb.offsetWidth/2;
    const fromRight=aCx<=bCx;
    const sa=fromRight?'right':'left',sb=fromRight?'left':'right';
    const p1=anchor(e.from,e.fromField,sa),p2=anchor(e.to,e.toField,sb);
    if(!p1||!p2)return;
    if(Math.abs(p1.y-p2.y)<1){
      out+=`<path d="M${p1.x.toFixed(1)} ${p1.y.toFixed(1)} L${p2.x.toFixed(1)} ${p2.y.toFixed(1)}" fill="none" stroke="var(--edge-fk)" stroke-width="1.5" stroke-linecap="round"${e.dash?' stroke-dasharray="5 4"':''} marker-end="url(#dot-end)"/>`;
      return;
    }
    const info=laneOf[idx];
    let baseMx=(p1.x+p2.x)/2;
    baseMx+=info.count>1?(info.lane-(info.count-1)/2)*16:0;
    const otherBoxes=boxes.filter(b=>b.id!==e.from&&b.id!==e.to);
    const yMin=Math.min(p1.y,p2.y),yMax=Math.max(p1.y,p2.y);
    const mx=findClearMx(baseMx,yMin,yMax,otherBoxes);
    const d=hvhPath(p1.x,p1.y,p2.x,p2.y,mx,8);
    out+=`<path d="${d}" fill="none" stroke="var(--edge-fk)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"${e.dash?' stroke-dasharray="5 4"':''} marker-end="url(#dot-end)"/>`;
  });
  svg.innerHTML=out;
}

function toggleNode(id){
  const ex=getExpandedMap();ex[id]=!ex[id];
  const el=document.getElementById('node-'+id);
  if(el)el.classList.toggle('expanded',ex[id]);
  resizeCanvas();drawEdges();
}

function bindDiagramEvents(){
  const canvas=document.getElementById('diagramRoot');
  canvas.querySelectorAll('.sn-chevron').forEach(btn=>{
    btn.addEventListener('click',ev=>{ev.stopPropagation();const node=ev.target.closest('.sn');if(node)toggleNode(node.dataset.nodeId)});
  });
  canvas.querySelectorAll('.sn').forEach(node=>{node.addEventListener('pointerdown',onCardDown)});
}

const DRAG_DEADZONE=4;
function onCardDown(ev){
  if(ev.target.closest('[data-role="toggle"]')||ev.target.closest('.fh'))return;
  ev.preventDefault();
  const node=ev.currentTarget,startX=ev.clientX,startY=ev.clientY;
  let lastX=startX,lastY=startY,dragging=false;
  try{node.setPointerCapture(ev.pointerId)}catch(e){}
  function move(e){
    if(!dragging){
      if(Math.abs(e.clientX-startX)+Math.abs(e.clientY-startY)<DRAG_DEADZONE)return;
      dragging=true;node.classList.add('dragging');node.style.zIndex=100;
    }
    const dx=e.clientX-lastX,dy=e.clientY-lastY;
    lastX=e.clientX;lastY=e.clientY;
    node.style.left=((parseFloat(node.style.left)||0)+dx)+'px';
    node.style.top=((parseFloat(node.style.top)||0)+dy)+'px';
    resizeCanvas();drawEdges();
  }
  function up(e){
    try{if(e&&node.hasPointerCapture(e.pointerId))node.releasePointerCapture(e.pointerId)}catch(err){}
    if(dragging){node.classList.remove('dragging');node.style.zIndex='';savePositions()}
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
  }
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
}

function buildDots(){document.getElementById('dotNav').innerHTML=currentSection().steps.map((st,i)=>`<button type="button" class="dot${i===curStep?' cur':''}" onclick="goStep(${i})" title="${st.t.replace(/"/g,'&quot;')}"></button>`).join('')}

function highlightDiagram(){
  const hi=currentSection().steps[curStep].hi;
  document.querySelectorAll('#diagramRoot .sn').forEach(el=>{
    el.classList.remove('tb-hi');
    if(hi===undefined)el.classList.add('tb-hi');
    else if(Array.isArray(hi)&&hi.length&&hi.includes(el.dataset.nodeId))el.classList.add('tb-hi');
  });
}

function renderStep(){
  const sec=currentSection(),st=sec.steps[curStep];
  document.getElementById('stepPhase').textContent=sec.label;
  document.getElementById('stepPhase').style.color=sec.phaseColor;
  document.getElementById('stepTitle').textContent=st.t;
  document.getElementById('stepDesc').innerHTML=st.d;
  document.getElementById('stepCtr').textContent=`Step ${curStep+1} of ${sec.steps.length}`;
  document.getElementById('prevBtn').disabled=curStep===0;
  const nb=document.getElementById('nextBtn');
  nb.textContent=curStep===sec.steps.length-1?'End of section ✓':'Next →';
  nb.disabled=curStep===sec.steps.length-1;
  buildTabs();buildDots();highlightDiagram();
}

function setTab(i){if(i<0||i>=SECTIONS.length)return;tabIndex=i;curStep=0;injectDiagram();renderStep();requestAnimationFrame(drawEdges)}
function goStep(i){if(i<0||i>=currentSection().steps.length)return;curStep=i;renderStep()}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();if(curStep<currentSection().steps.length-1)goStep(curStep+1)}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();if(curStep>0)goStep(curStep-1)}
});
window.addEventListener('resize',()=>{resizeCanvas();drawEdges()});

(function init(){buildTabs();injectDiagram();curStep=0;renderStep()})();
</script>
</body>
</html>
